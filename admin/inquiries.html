<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>문의 목록 | 중앙부동산 Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-side">
      <div class="admin-brand"><span class="admin-logo"><img src="../images/logo.png" alt="중앙공인중개사사무소 로고"></span><div><strong>중앙공인중개사사무소 Admin</strong><span>JUNGANG REAL ESTATE</span></div></div>
      <a href="index.html">대시보드</a>
      <a class="active" href="inquiries.html">문의 목록</a>
      <a href="properties-mgmt.html">매물 관리</a>
      <a href="settings.html">사이트 설정</a>
      <a href="../index.html">사이트로 돌아가기</a>
    </aside>
    <main class="admin-main">
      <div class="admin-top"><div><h1>문의 목록</h1><p>상담, 투자, 매물 알림 신청을 한 곳에서 확인합니다.</p></div><button class="btn btn-primary" data-export>CSV 다운로드</button></div>
      <table class="admin-table"><thead><tr><th>번호</th><th>이름</th><th>연락처</th><th>상담유형</th><th>접수일</th><th>상태</th><th>액션</th></tr></thead><tbody data-inquiry-body></tbody></table>
      <div class="admin-modal" data-inquiry-modal hidden>
        <div class="admin-modal-panel">
          <div class="admin-modal-head">
            <h2>문의 상세</h2>
            <button type="button" class="admin-modal-close" data-modal-close aria-label="닫기">×</button>
          </div>
          <div class="admin-detail-grid" data-inquiry-detail></div>
          <div class="admin-modal-actions">
            <button type="button" class="btn btn-secondary" data-modal-close>닫기</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/admin.js"></script>
</body>
</html>
